name: Réentraînement Génie du Foot
on:
  schedule:
    - cron: '0 5 * * 2'   # mardis 05:00 UTC
    - cron: '0 10 * * 5'  # vendredis 10:00 UTC (figer les prédictions du week-end)
  workflow_dispatch:
jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install numpy scipy pandas
      - run: python3 foot/train.py      # données fraîches football-data.co.uk (F1+F2)
      - run: python3 foot/journal.py    # évalue le passé, fige les 9 prochains jours
      - run: |
          git config user.name "genie-foot-bot"
          git config user.email "actions@github.com"
          git add foot/model.json foot/journal.json
          git diff --cached --quiet || git commit -m "maj auto model.json + journal"
          git push
